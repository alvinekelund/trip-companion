<style>
  :root {
    --bg: #fafaf9;
    --surface: #ffffff;
    --ink: #1c1917;
    --muted: #78716c;
    --line: #e7e5e4;
    --accent: #ea580c;
  }
  .dark {
    --bg: #0c0a09;
    --surface: #1c1917;
    --ink: #fafaf9;
    --muted: #a8a29e;
    --line: #292524;
    --accent: #fb923c;
  }
  html, body { background: var(--bg); color: var(--ink); }
  body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .surface { background: var(--surface); border-color: var(--line); }
  .ink { color: var(--ink); }
  .muted { color: var(--muted); }
  .line { border-color: var(--line); }
  .font-display { font-family: 'Fraunces', Georgia, serif; font-optical-sizing: auto; }

  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 18px;
    box-shadow: 0 1px 2px rgba(0,0,0,.04), 0 6px 20px -12px rgba(0,0,0,.08);
  }
  .dark .card { box-shadow: 0 1px 2px rgba(0,0,0,.3), 0 10px 30px -16px rgba(0,0,0,.6); }

  .chip { display: inline-flex; align-items: center; gap: .35rem; padding: .2rem .6rem; border-radius: 999px; font-size: .72rem; font-weight: 500; border: 1px solid var(--line); background: var(--surface); }

  .tab-btn {
    flex: 0 0 auto; padding: .55rem .9rem; border-radius: 999px; font-size: .8rem; font-weight: 500;
    border: 1px solid var(--line); background: var(--surface); color: var(--muted);
    white-space: nowrap; transition: all .15s ease;
  }
  .tab-btn:hover { color: var(--ink); }
  .tab-btn.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }

  .progress-track { height: 8px; background: var(--line); border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #f97316, #ec4899, #8b5cf6); border-radius: 999px; transition: width .8s cubic-bezier(.4,0,.2,1); }

  /* Phrase flip card */
  .flip { perspective: 1000px; }
  .flip-inner { position: relative; width: 100%; height: 100%; transition: transform .5s; transform-style: preserve-3d; }
  .flip.flipped .flip-inner { transform: rotateY(180deg); }
  .flip-face { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 1rem; border-radius: 18px; }
  .flip-back { transform: rotateY(180deg); }

  /* Bingo */
  .bingo-cell { aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; text-align: center; font-size: .7rem; font-weight: 500; padding: .35rem; border-radius: 12px; border: 1px solid var(--line); background: var(--surface); cursor: pointer; line-height: 1.15; transition: all .18s ease; user-select: none; }
  .bingo-cell:hover { transform: translateY(-1px); }
  .bingo-cell.marked { background: linear-gradient(135deg, #f97316, #ec4899); color: white; border-color: transparent; transform: scale(.97); box-shadow: 0 8px 20px -8px rgba(236,72,153,.5); }
  .bingo-cell.marked::after { content: '✓'; position: absolute; }

  /* Chat */
  .bubble { max-width: 85%; padding: .65rem .9rem; border-radius: 16px; font-size: .88rem; line-height: 1.45; }
  .bubble.user { background: var(--ink); color: var(--bg); border-bottom-right-radius: 4px; align-self: flex-end; }
  .bubble.bot { background: var(--surface); border: 1px solid var(--line); border-bottom-left-radius: 4px; }
  .typing span { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--muted); margin: 0 1px; animation: bounce 1.2s infinite ease-in-out; }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%, 80%, 100% { transform: scale(.6); opacity: .4; } 40% { transform: scale(1); opacity: 1; } }

  /* Pulse for "you are here" */
  .dot-pulse { position: relative; display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #22c55e; }
  .dot-pulse::before { content: ''; position: absolute; inset: 0; border-radius: 50%; background: #22c55e; animation: pulse 1.8s ease-out infinite; }
  @keyframes pulse { 0% { transform: scale(1); opacity: .8; } 100% { transform: scale(3); opacity: 0; } }

  /* Scrollbar polish */
  ::-webkit-scrollbar { height: 6px; width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 10px; }

  .hide-scrollbar::-webkit-scrollbar { display: none; }
  .hide-scrollbar { scrollbar-width: none; }

  /* Modal */
  .modal-backdrop { background: rgba(0,0,0,.45); backdrop-filter: blur(6px); }

  /* Subtle fade in */
  .fade-in { animation: fadeIn .4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  textarea, input { background: transparent; color: var(--ink); }
  textarea:focus, input:focus { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 10px; }
</style>
</head>
<body class="min-h-screen">

<!-- HEADER -->
<header class="sticky top-0 z-40 backdrop-blur-md border-b line" style="background: color-mix(in srgb, var(--bg) 85%, transparent);">
  <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between gap-3">

        <div class="font-display text-[17px] font-bold tracking-tight">Trip Companion</div>
        <div class="text-[11px] muted">Alvin · Osaka → NZ</div>

    </div>
    <div class="flex items-center gap-1.5">
      <button id="darkBtn" class="w-9 h-9 rounded-full flex items-center justify-center border line hover:scale-105 transition surface" aria-label="Toggle theme"><i data-lucide="moon" class="w-4 h-4"></i></button>
      <button id="settingsBtn" class="w-9 h-9 rounded-full flex items-center justify-center border line hover:scale-105 transition surface" aria-label="Settings"><i data-lucide="settings" class="w-4 h-4"></i></button>
    </div>
  </div>
</header>

<main class="max-w-3xl mx-auto px-4 pb-24 pt-5 space-y-5">

<!-- TIMELINE -->
<section class="card p-5 fade-in">
  <div class="flex items-center justify-between mb-3">
    <div>
      <div class="text-[11px] uppercase tracking-wider muted font-semibold">Right now</div>
      <div class="flex items-center gap-2 mt-1">
        <span class="dot-pulse"></span>
        <span id="currentCity" class="font-display text-2xl font-bold"></span>
      </div>
    </div>
    <div class="text-right">
      <div class="text-[11px] uppercase tracking-wider muted font-semibold">Next up</div>

    </div>
  </div>
  <div class="progress-track mb-2"><div id="progressFill" class="progress-fill" style="width:0%"></div></div>
  <div id="tripStats" class="text-xs muted flex justify-between"></div>
  <div id="timelineStrip" class="mt-4 flex gap-2 overflow-x-auto hide-scrollbar -mx-1 px-1"></div>
</section>

<!-- TABS -->
<nav id="tabs" class="flex gap-2 overflow-x-auto hide-scrollbar -mx-4 px-4 pb-1"></nav>

<!-- SECTIONS -->
<section id="content" class="space-y-5"></section>

<footer class="text-center text-[11px] muted pt-6 pb-4">
  Made with care · Travel safe, Alvin · <span id="todayFooter"></span>
</footer>
</main>

<!-- SETTINGS MODAL -->
<div id="settingsModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 modal-backdrop">
  <div class="card p-5 w-full max-w-sm fade-in">
    <div class="flex items-center justify-between mb-3">
      <h3 class="font-display text-lg font-bold">Settings</h3>
      <button id="closeSettings" class="p-1 rounded-full hover:bg-black/5 dark:hover:bg-white/10"><i data-lucide="x" class="w-4 h-4"></i></button>
    </div>
    <label class="text-xs font-semibold uppercase tracking-wider muted">Anthropic API key</label>
    <input id="apiKeyInput" type="password" placeholder="sk-ant-..." class="w-full mt-1.5 px-3 py-2.5 rounded-xl border line text-sm font-mono" autocomplete="off" />
    <p class="text-[11px] muted mt-2 leading-relaxed">Your key stays in this tab only, never saved. Refresh and it's gone. Used only to call Claude directly from your browser.</p>
    <div class="flex gap-2 mt-4">
      <button id="clearKey" class="flex-1 py-2 rounded-xl border line text-sm font-medium hover:bg-black/5 dark:hover:bg-white/10">Clear</button>
      <button id="saveKey" class="flex-1 py-2 rounded-xl text-sm font-semibold text-white" style="background: linear-gradient(135deg,#f97316,#ec4899);">Save</button>
    </div>
    <div id="keyStatus" class="text-[11px] mt-3 text-center muted"></div>
  </div>
</div>

/* =========================================================================
   DATA — dates, cities, phrases, etc.
   ========================================================================= */
const TODAY = new Date('2026-04-17T00:00:00');

function addDays(date, n) { const d = new Date(date); d.setDate(d.getDate() + n); return d; }
function fmtDate(d) { return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
function fmtDateLong(d) { return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }); }
function daysBetween(a, b) { return Math.round((b - a) / 86400000); }

const ITINERARY = [
  { id: 'osaka',    name: 'Osaka',    country: 'Japan',       flag: '🇯🇵', nights: 4, tint: '#ef4444', tintSoft:'#fee2e2' },
  { id: 'hk',       name: 'Hong Kong',country: 'Hong Kong',   flag: '🇭🇰', nights: 3, tint: '#f59e0b', tintSoft:'#fef3c7' },
  { id: 'seoul',    name: 'Seoul',    country: 'South Korea', flag: '🇰🇷', nights: 4, tint: '#3b82f6', tintSoft:'#dbeafe' },
  { id: 'beijing',  name: 'Beijing',  country: 'China',       flag: '🇨🇳', nights: 6, tint: '#dc2626', tintSoft:'#fee2e2' },
  { id: 'nz',       name: 'New Zealand', country: 'NZ',       flag: '🇳🇿', nights: 6, tint: '#10b981', tintSoft:'#d1fae5' },
];

// Compute start & end dates. Osaka started earlier but we only have "4 nights remaining" — so depart = TODAY + 4
let cursor = new Date(TODAY);
ITINERARY.forEach((leg, i) => {
  if (i === 0) {
    leg.arrive = new Date('2026-04-13T00:00:00'); // assume arrived 4 days before (flavor only)
    leg.depart = addDays(TODAY, leg.nights);
  } else {
    leg.arrive = new Date(cursor);
    leg.depart = addDays(cursor, leg.nights);
  }
  cursor = new Date(leg.depart);
});

function currentLegIndex() {
  for (let i = 0; i < ITINERARY.length; i++) {
    if (TODAY < ITINERARY[i].depart) return i;
  }
  return ITINERARY.length - 1;
}

const $ = (s, ctx=document) => ctx.querySelector(s);
const $$ = (s, ctx=document) => Array.from(ctx.querySelectorAll(s));

function renderTimeline() {
  const idx = currentLegIndex();
  const leg = ITINERARY[idx];
  $('#currentCity').innerHTML = `${leg.flag} ${leg.name}`;

  const tripStart = ITINERARY[0].arrive;
  const tripEnd = ITINERARY[ITINERARY.length-1].depart;
  const total = daysBetween(tripStart, tripEnd);
  const done = daysBetween(tripStart, TODAY);
  const pct = Math.max(0, Math.min(100, (done / total) * 100));
  $('#progressFill').style.width = pct + '%';

  const nightsLeftHere = Math.max(0, daysBetween(TODAY, leg.depart));
  const nextLeg = ITINERARY[idx+1];
  if (nextLeg) {
    $('#nextCountdown').innerHTML = `${nextLeg.flag} ${nextLeg.name} · <span style="color:var(--accent)">in ${nightsLeftHere}d</span>`;
  } else {
    $('#nextCountdown').innerHTML = `Flight home · ${nightsLeftHere}d`;
  }

  $('#tripStats').innerHTML = `
    <span>${fmtDate(tripStart)} → ${fmtDate(tripEnd)}</span>
    <span>${done} / ${total} days · ${Math.round(pct)}%</span>
  `;

  // Strip
  $('#timelineStrip').innerHTML = ITINERARY.map((l, i) => {
    const isCurrent = i === idx;
    const isPast = i < idx;
    const f = l.inboundFlight;
    const flightChip = f ? `<div class="text-[9.5px] muted mt-1 font-mono truncate">✈ ${f.flightNo} · ${f.to.time}</div>` : '';
    return `
      <div class="flex-shrink-0 rounded-2xl p-3 border min-w-[135px] ${isCurrent ? 'ring-2 ring-offset-2' : ''}"
        style="border-color:var(--line); background:${isCurrent ? l.tint+'14' : 'var(--surface)'}; ${isCurrent?'--tw-ring-color:'+l.tint:''}; opacity:${isPast?0.55:1};">
        <div class="text-lg">${l.flag}</div>
        <div class="font-semibold text-sm mt-0.5">${l.name}</div>
        <div class="text-[10px] muted mt-1">${fmtDate(l.arrive)} – ${fmtDate(l.depart)}</div>
        <div class="text-[10px] mt-0.5" style="color:${l.tint}; font-weight:600;">${l.nights} nights${isCurrent?' · now':''}</div>
        ${flightChip}
      </div>
    `;
  }).join('');
}

function renderTabs() {
  $('#tabs').innerHTML = TABS.map(t => `
    <button class="tab-btn ${state.activeTab===t.id?'active':''}" data-tab="${t.id}">
      <span class="inline-flex items-center gap-1.5"><i data-lucide="${t.icon}" class="w-3.5 h-3.5"></i>${t.label}</span>
    </button>
  `).join('');
  lucide.createIcons();
  $$('#tabs .tab-btn').forEach(b => b.addEventListener('click', () => { state.activeTab = b.dataset.tab; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }));
}

        <i data-lucide="plane" class="w-4 h-4 muted"></i>
        <div class="text-[11px] uppercase tracking-wider muted font-bold">Flights · ${BOOKINGS.flights.length} segments</div>
      </div>
      ${BOOKINGS.flights.map(flightCard).join('')}
      <div class="flex items-center gap-2 pt-2">
        <i data-lucide="car" class="w-4 h-4 muted"></i>
        <div class="text-[11px] uppercase tracking-wider muted font-bold">Ground transport</div>
      </div>
      ${carCard}
    </div>
  `;
}

function renderGuide() {
  const hasKey = !!state.apiKey;
  return `
  <div class="card p-4 min-h-[420px] flex flex-col">
    <div class="flex items-center justify-between mb-3">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-full flex items-center justify-center text-white" style="background: linear-gradient(135deg,#f97316,#ec4899);"><i data-lucide="sparkles" class="w-4 h-4"></i></div>
        <div>
          <div class="font-display font-bold">Ask the Guide</div>
          <div class="text-[11px] muted">Claude Sonnet 4.6 · direct from your browser</div>
        </div>
      </div>
      <button id="clearChat" class="text-[11px] muted underline hover:no-underline">clear</button>
    </div>

    <div id="chatLog" class="flex-1 flex flex-col gap-2.5 overflow-y-auto max-h-[55vh] pb-2">
      ${!hasKey ? `
        <div class="m-auto text-center max-w-xs py-8">
          <div class="inline-flex w-12 h-12 rounded-2xl items-center justify-center mb-3" style="background: linear-gradient(135deg,#f9731620,#ec489920);">
            <i data-lucide="key" class="w-5 h-5" style="color:#ec4899"></i>
          </div>
          <div class="font-semibold mb-1">Paste your API key to start chatting</div>
          <div class="text-[12px] muted">Tap the ⚙️ settings in the header. Your key stays in this tab only.</div>
        </div>
      ` : state.chat.length === 0 ? `
        <div class="m-auto text-center max-w-xs py-6">
          <div class="text-[12px] muted mb-3">Try one of these:</div>
          <div class="flex flex-col gap-1.5">
            ${['What should I do tonight?','Best hidden bars in Osaka','Suggest a Day 1 Hong Kong plan','Safe late-night food near me?'].map(q => `
              <button class="suggest-q text-[12px] px-3 py-2 rounded-xl border line hover:bg-black/5 dark:hover:bg-white/10 text-left">${q}</button>
            `).join('')}
          </div>
        </div>
      ` : state.chat.map(m => `
        <div class="bubble ${m.role==='user'?'user':'bot'}">${escapeHtml(m.content).replace(/\n/g,'<br>')}</div>
      `).join('')}
      ${state.chatLoading ? '<div class="bubble bot typing"><span></span><span></span><span></span></div>' : ''}
    </div>

    <div class="flex gap-2 pt-3 border-t line mt-2">
      <input id="chatInput" placeholder="${hasKey ? 'Ask anything about the trip…' : 'Add your API key first'}" ${hasKey?'':'disabled'} class="flex-1 px-3 py-2.5 rounded-xl border line text-sm" />
      <button id="chatSend" ${hasKey?'':'disabled'} class="px-4 rounded-xl text-white font-medium disabled:opacity-40" style="background: linear-gradient(135deg,#f97316,#ec4899);"><i data-lucide="send" class="w-4 h-4"></i></button>
    </div>
    <div class="text-[10px] muted mt-2 text-center">Your key stays in this tab only, never saved. Calls go direct to api.anthropic.com.</div>
  </div>
  `;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderContent() {
  const c = $('#content');
  const tab = state.activeTab;
  let html = '';
  if (tab === 'cities')     html = renderCities();
  else if (tab === 'phrases')   html = renderPhrases();
  else if (tab === 'currency')  html = renderCurrency();
  else if (tab === 'etiquette') html = renderEtiquette();
  else if (tab === 'transit')   html = renderTransit();
  else if (tab === 'bingo')     html = renderBingo();
  else if (tab === 'emergency') html = renderEmergency();
  else if (tab === 'time')      html = renderTime();
  else if (tab === 'weather')   html = renderWeather();
  else if (tab === 'journal')   html = renderJournal();
  else if (tab === 'guide')     html = renderGuide();
  else if (tab === 'bookings')  html = renderBookings();
  c.innerHTML = html;
  c.classList.remove('fade-in'); void c.offsetWidth; c.classList.add('fade-in');
  bindContent();
  lucide.createIcons();
}

function bindContent() {
  // Phrases: flip + lang switch
  $$('#content [data-lang]').forEach(b => b.addEventListener('click', () => {
    state.phraseLang = b.dataset.lang; state.flipped = new Set(); renderContent();
  }));
  $$('#content .flip').forEach(el => el.addEventListener('click', () => {
    const k = el.dataset.key;
    if (state.flipped.has(k)) state.flipped.delete(k); else state.flipped.add(k);
    el.classList.toggle('flipped');
  }));

  // Currency
  $$('#content .currency-in').forEach(inp => inp.addEventListener('input', e => {
    state.convertInput[e.target.dataset.city] = e.target.value;
    renderContent();
    const next = $('#content .currency-in[data-city="'+e.target.dataset.city+'"]');
    if (next) { next.focus(); next.setSelectionRange(e.target.value.length, e.target.value.length); }
  }));

  // Bingo
  $$('#content [data-bcity]').forEach(b => b.addEventListener('click', () => {
    state.activeBingoCity = b.dataset.bcity; renderContent();
  }));
  $$('#content .bingo-cell').forEach(el => el.addEventListener('click', () => {
    const city = state.activeBingoCity || ITINERARY[currentLegIndex()].id;
    const i = parseInt(el.dataset.idx);
    if (state.bingo[city].has(i)) state.bingo[city].delete(i); else state.bingo[city].add(i);
    el.classList.toggle('marked');
    const counter = $('#content .text-\\[11px\\].muted span');
    // re-render count label
    renderContent();
  }));
  const resetBtn = $('#resetBingo');
  if (resetBtn) resetBtn.addEventListener('click', () => {
    const city = state.activeBingoCity || ITINERARY[currentLegIndex()].id;
    state.bingo[city] = new Set(); renderContent();
  });

  // Emergency inputs
  ['eBlood','eAllergies','eContact'].forEach(id => {
    const el = $('#'+id);
    if (el) el.addEventListener('input', e => {
      state.emergency[id.substring(1).toLowerCase()] = e.target.value;
    });
  });

  // Journal
  const jPrev = $('#jPrev'), jNext = $('#jNext'), jText = $('#jText');
  if (jPrev) jPrev.addEventListener('click', () => { if (state.journalDay > 0) { state.journalDay--; renderContent(); }});
  if (jNext) jNext.addEventListener('click', () => { state.journalDay++; renderContent(); });
  if (jText) jText.addEventListener('input', e => { state.journal[state.journalDay] = e.target.value; });
  $$('#content [data-jump]').forEach(b => b.addEventListener('click', () => { state.journalDay = parseInt(b.dataset.jump); renderContent(); }));

  // Chat
  const send = $('#chatSend'), input = $('#chatInput');
  if (send) send.addEventListener('click', () => sendChat(input.value));
  if (input) input.addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(input.value); });
  $$('#content .suggest-q').forEach(b => b.addEventListener('click', () => sendChat(b.textContent)));
  const clr = $('#clearChat'); if (clr) clr.addEventListener('click', () => { state.chat = []; renderContent(); });
}

/* =========================================================================
   CHAT — Claude
   ========================================================================= */
function buildSystemPrompt() {
  const idx = currentLegIndex();
  const legs = ITINERARY.map((l, i) => `${i+1}. ${l.flag} ${l.name} (${l.country}): ${fmtDate(l.arrive)}–${fmtDate(l.depart)}, ${l.nights} nights${i===idx?' [CURRENT]':''}`).join('\n');
  return `You are Alvin's personal travel guide for this specific trip. Be warm, concise, and extremely specific — real restaurant names, real neighborhoods, real metro stops. Prefer a single, confident recommendation over a bulleted list. Avoid generic travel-blog advice.

Today is ${fmtDateLong(TODAY)}. Alvin's itinerary:
${legs}

Right now Alvin is in ${ITINERARY[idx].name} (${ITINERARY[idx].country}). They have ${daysBetween(TODAY, ITINERARY[idx].depart)} night(s) left in this city before moving to ${ITINERARY[idx+1] ? ITINERARY[idx+1].name : 'fly home'}.

Style:
- Friendly, like a well-traveled friend texting back
- 1-3 short paragraphs max; bullet lists only when truly comparing options
- When recommending food/places, give one pick and a quick why — don't dump a list
- If Alvin asks something you can't know (live hours, current weather), say so briefly and offer how to check
- Always answer in English

You can assume Alvin has a Swedish passport, speaks English, and is an experienced independent traveler.`;
}

async function sendChat(text) {
  text = (text || '').trim();
  if (!text) return;
  if (!state.apiKey) return;

  state.chat.push({ role: 'user', content: text });
  state.chatLoading = true;
  renderContent();
  // Clear input
  setTimeout(() => { const i = $('#chatInput'); if (i) i.value = ''; }, 0);

  // Scroll chat to bottom
  setTimeout(() => { const log = $('#chatLog'); if (log) log.scrollTop = log.scrollHeight; }, 50);

  try {
    const payload = {
      model: 'claude-sonnet-4-6',
      max_tokens: 1024,
      system: buildSystemPrompt(),
      messages: state.chat.slice(-10).map(m => ({ role: m.role, content: m.content })),
    };
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'content-type': 'application/json',
        'x-api-key': state.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify(payload),
    });

    if (!res.ok) {
      const errText = await res.text().catch(() => '');
      let msg = 'Something went wrong.';
      if (res.status === 401) msg = 'That API key didn\'t work — double-check it in Settings.';
      else if (res.status === 429) msg = 'Rate limited. Wait a minute and try again.';
      else if (res.status >= 500) msg = 'Anthropic\'s having trouble — try again in a bit.';
      else msg = `Error ${res.status}: ${errText.slice(0,120)}`;
      state.chat.push({ role: 'assistant', content: msg });
    } else {
      const json = await res.json();
      const textBlock = (json.content || []).find(b => b.type === 'text');
      state.chat.push({ role: 'assistant', content: (textBlock && textBlock.text) || '(empty reply)' });
    }
  } catch (err) {
    state.chat.push({ role: 'assistant', content: 'Network error — are you offline? (' + (err.message || 'unknown') + ')' });
  } finally {
    state.chatLoading = false;
    renderContent();
    setTimeout(() => { const log = $('#chatLog'); if (log) log.scrollTop = log.scrollHeight; }, 50);
  }
}

/* =========================================================================
   SETTINGS / THEME
   ========================================================================= */
function bindSettings() {
  const modal = $('#settingsModal');
  const open = () => { modal.classList.remove('hidden'); modal.classList.add('flex'); $('#apiKeyInput').value = state.apiKey; updateKeyStatus(); };
  const close = () => { modal.classList.add('hidden'); modal.classList.remove('flex'); };
  $('#settingsBtn').addEventListener('click', open);
  $('#closeSettings').addEventListener('click', close);
  modal.addEventListener('click', e => { if (e.target === modal) close(); });
  $('#saveKey').addEventListener('click', () => {
    state.apiKey = $('#apiKeyInput').value.trim();
    updateKeyStatus();
    if (state.activeTab === 'guide') renderContent();
  });
  $('#clearKey').addEventListener('click', () => {
    state.apiKey = ''; $('#apiKeyInput').value = ''; updateKeyStatus();
    if (state.activeTab === 'guide') renderContent();
  });
}
function updateKeyStatus() {
  const s = $('#keyStatus');
  if (state.apiKey) s.innerHTML = '<span style="color:#10b981;">● Key loaded · chat ready</span>';
  else s.innerHTML = '● No key set';
}

function bindDarkMode() {
  const apply = () => {
    document.documentElement.classList.toggle('dark', state.dark);
    const icon = $('#darkBtn i');
    if (icon) { icon.setAttribute('data-lucide', state.dark ? 'sun' : 'moon'); lucide.createIcons(); }
  };
  state.dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  apply();
  $('#darkBtn').addEventListener('click', () => { state.dark = !state.dark; apply(); });
}

/* =========================================================================
   BOOT
   ========================================================================= */
function render() {
  renderTimeline();
  renderTabs();
  renderContent();
  lucide.createIcons();
}

function init() {
  $('#todayFooter').textContent = fmtDateLong(TODAY);
  bindDarkMode();
  bindSettings();
  render();

  // Timeline refresh every minute in case day ticks over
  setInterval(renderTimeline, 60000);
  // Refresh clocks on Time tab every 30s
  setInterval(() => { if (state.activeTab === 'time') renderContent(); }, 30000);
}

document.addEventListener('DOMContentLoaded', init);
</script>
